app:
  # FPS 数字显示的平滑系数，越大越灵敏，越小越稳定。
  fps_smoothing_alpha: 0.2

camera:
  # 图像源模式：camera 表示实时摄像头，video 表示本地视频回放，shared_memory 表示 AR 共享内存。
  mode: shared_memory
  # 摄像头设备号，Linux 下常见为 0、1、2。
  device_id: 0
  # 视频模式下使用的视频路径。
  video_path: outputs/video/record_20260708_135111.mp4
  # AR 系统创建的 POSIX 共享内存名称；帧协议为 QII 头部加 RGB888 图像。
  shared_memory_name: shm_ar_video
  # 视频是否循环播放。
  loop_video: false
  # 采集或回放后希望使用的图像尺寸。
  width: 640
  height: 480
  fps: 60
  # 是否镜像翻转，部分摄像头安装方向反了时很有用。
  mirror: false
  reconnect_interval_sec: 0.5
  max_reconnect_attempts: 5

lane_geometry:
  roi:
    top_ratio: 0.585
    bottom_ratio: 1.0
    left_ratio: 0.05
    right_ratio: 0.95
  boundary:
    gradient_jump_ratio: 0.05
    gradient_step_ratio: 0.025
    max_single_side_gap_rows: 12
    min_run_width_px: 6
  temporal_filter:
    weights: [0.20, 0.50, 0.30]
  centerline:
    scan_step: 4
    min_valid_points: 6
    default_lane_width_px: 60
    lookahead_ratio: 0.45
  confidence:
    lost_threshold: 0.22
    expected_area_ratio: 0.04
    residual_tolerance_px: 22.0
  fork:
    corner_span_rows: 10
    outward_jump_ratio: 0.08
    min_lost_rows: 3
    confirm_frames: 2
    release_frames: 3

tracker:
  # EMA 平滑参数和短时丢线预测参数。
  ema_alpha: 0.25
  recovery_alpha: 0.45
  confidence_gate: 0.45
  max_prediction_frames: 6
  prediction_decay: 0.88
  min_prediction_confidence: 0.10
  centerline_alpha: 0.25
  max_centerline_point_shift_px: 80

target_selector:
  base_lookahead_px: 120
  min_lookahead_px: 70
  max_lookahead_px: 180
  curvature_gain: 80
  low_confidence_lookahead_px: 80
  low_confidence_threshold: 0.45

rknn_lane_segmenter:
  # RK3588 上通过 RKNNLite2 执行单类 track 实例分割，并替换 HSV/Lab 初始分割。
  enable: true
  model_path: models/yolov5n_seg_track_480x640_int8_rk3588.rknn
  # 按 [width, height] 配置；模型固定输入为 RGB uint8 NHWC 640x480。
  input_size: [640, 480]
  score_threshold: 0.30
  nms_threshold: 0.45
  mask_threshold: 0.5
  max_instances: 1
  runtime_backend: lite2
  core_mask: NPU_CORE_0

  parallel: true
  worker_count: 3
  worker_core_masks: [NPU_CORE_0, NPU_CORE_1, NPU_CORE_2]
  max_result_age_frames: 2
  drop_stale_results: true
  
rknn_object_detector:
  # Orange Pi / RK3588 上使用 rknnlite 加载本目录下的 RKNN 模型。
  enable: true
  model_path: models/rknn_7classes.rknn
  # 输入尺寸按 [width, height] 配置；当前模型固定为 640x480。
  input_size: [640, 480]
  input_layout: nhwc
  input_color: rgb
  input_dtype: uint8
  score_threshold: 0.50
  nms_threshold: 0.45
  max_detections: 30
  runtime_backend: lite2
  inference_stride: 2
  max_result_age_frames: 12
  drop_stale_results: true
  # 模型有 7 个类别输出；顺序必须与训练时 label_list.txt 保持一致。
  class_names: [car, coin, Go, human, road_sign, speed_limit, Stop]
  # 单核运行入口；可选值：NPU_CORE_0、NPU_CORE_1、NPU_CORE_2。
  core_mask: NPU_CORE_1

gold_target:
  enabled: true
  class_names: [coin]
  min_confidence: 0.20
  hold_frames: 4
  approach_speed_limit: 0.85
  close_speed_limit: 0.45
  close_y_ratio: 0.82
  max_above_roi_ratio: 0.8
  aim_at: bottom_center

blocking_analyzer:
  enabled: true
  allowed_class_names: [car, human]
  corridor_half_width_px: 90
  confidence_threshold: 0.45
  min_box_area: 600
  near_y_ratio: 0.42
  too_close_y_ratio: 0.82
  blocking_score_threshold: 0.25
  side_deadband_px: 25

avoidance_target_planner:
  enabled: true
  max_avoid_bias_px: 110
  bias_alpha: 0.25
  return_decay: 0.85
  clear_frames: 8
  front_margin_px: 45
  rear_margin_px: 35
  target_front_margin_px: 35
  min_lane_confidence_to_start_avoid: 0.45
  max_target_jump_px: 50

planner:
  # 这些参数只用于上位机高层策略，不是底层 PID。
  lateral_gain: 0.065
  heading_gain: 0.85
  curvature_gain: 140.0
  max_steer_deg: 35.0
  base_speed: 1.6
  max_speed: 2.2
  min_speed: 0.45
  straight_curvature_threshold: 0.0025
  straight_boost_speed: 0.2
  curvature_speed_gain: 120.0
  heading_speed_gain: 0.03
  confidence_speed_gain: 0.7
  caution_confidence_threshold: 0.55
  lost_speed: 0.25
  lost_steer_decay: 0.6

bridge:
  # bridge.type 选 mock 时只打印，选 serial 时走真实串口。
  type: mock
  serial:
    # 这里是串口参数，后续和 TC264 联调时重点关注这一段。
    port: /dev/ttyUSB0
    baudrate: 115200
    timeout: 0.02
    write_timeout: 0.02
    reconnect_interval_sec: 0.5
    max_reconnect_attempts: 3

visualizer:
  # show_window 适合本地调试；车上无屏时可关掉。
  show_window: true
  window_name: X-SmartCar Upper
  # 如果屏幕上的中文变成问号，可以把这里指向一个中文字体文件。
  # Windows 常见示例：C:/Windows/Fonts/msyh.ttc
  # Linux 常见示例：/usr/share/fonts/truetype/wqy/wqy-zenhei.ttc
  font_path: "C:/Windows/Fonts/msyh.ttc"
  font_size: 22
  # track mask 在 ROI 内以 BGR 颜色半透明叠加。
  mask_alpha: 0.35
  mask_color: [0, 180, 255]
  save_video: false
  save_screenshot: false
  save_dir: outputs/visual
  video_name: xsmart.mp4
  video_fourcc: mp4v
  video_fps: 25

  frame_stride: 3

extensions:
  ocr:
    # RK3588 only: both models run through RKNN-Toolkit-Lite2, without ONNX fallback.
    enable: true
    det_model_path: third_party/ppocr/PPOCR-Det/model/ppocrv4_det.rknn
    rec_model_path: third_party/ppocr/PPOCR-Rec/model/ppocrv4_rec.rknn
    system_python_dir: third_party/ppocr/PPOCR-System/ppocr_runtime
    target: rk3588
    core_mask: NPU_CORE_1
    class_names: [road_sign]
    bbox_min_confidence: 0.50
    bbox_min_width_px: 140
    bbox_min_height_px: 70
    bbox_padding_ratio: 0.10
    input_width: 480
    input_height: 480
    min_score: 0.50
    accept_score: 0.60
    retry_interval_sec: 0.50
    cooldown_seconds: 20.0
    bbox_display_seconds: 1.0
    output_dir: outputs/logs

  qianfan_route:
    enable: true
    api_url: https://qianfan.baidubce.com/v2/chat/completions
    model: ernie-4.5-turbo-vl
    api_key_env: QIANFAN_API_KEY
    connect_timeout_sec: 2.0
    read_timeout_sec: 8.0
    max_attempts: 2
    retry_interval_sec: 0.5
    fallback_direction: left

logger:
  # CSV 日志方便赛后分析误差和调速效果。
  enable: false
  output_dir: outputs/logs
